# Example golangci-lint configuration for the lostfield linter.
#
# lostfield integrates with golangci-lint through the module plugin system:
# build a custom golangci-lint binary once (see .custom-gcl.example.yml),
# then enable and configure lostfield here like any other linter.
#
# All settings are optional - omitted keys keep their defaults.

version: "2"

linters:
  enable:
    - lostfield
  settings:
    custom:
      lostfield:
        type: "module"
        description: "Detects incomplete struct converter functions (lost fields)"
        settings:
          # Check method receivers in addition to plain functions.
          # Default: true
          include-methods: true

          # Allow Get* methods as a substitute for direct field access.
          # Default: true
          allow-getters: true

          # Detect slice->non-slice aggregating converters.
          # Default: true
          allow-aggregators: true

          # Regex patterns for field names to ignore. Matched (unanchored)
          # against both the leaf field name and the full nested path
          # (e.g. "User.Role.CreatedAt"). Anchor when you need exactness.
          # Typical for DB-managed fields:
          # Default: []
          exclude-fields:
            - "^ID$"
            - "CreatedAt"
            - "UpdatedAt"
            - "DeletedAt"

          # Glob patterns for function/method names to exclude from detection.
          # Default: []
          exclude-converters: []
          # e.g.: ["Get*", "Map*", "*Helper"]

          # Glob patterns for function/method names to analyze exclusively
          # (inverse of exclude-converters). Default: []
          only-converters: []

          # Glob patterns for file paths to exclude.
          # Default: ["*_test.go", "*.pb.go", "*/vendor/*"]
          exclude-files:
            - "*_test.go"
            - "*.pb.go"
            - "*/vendor/*"

          # Minimum type-name similarity (0.0-1.0) for a function to count as a
          # converter. 0.0 = substring matching (default). Recommended: 0.6 -
          # it keeps genuine Model->ModelDTO pairs while dropping functions that
          # merely share a name fragment (e.g. Message vs MessageNewParams).
          min-similarity: 0.6

          # Struct tags marking fields to skip. Entries are either a bare tag
          # key ("internal" - any value matches) or key:"value" form.
          # Default: []
          ignore-tags:
            - 'lostfield:"ignore"'

          # Include generated files in analysis. Default: false
          include-generated: false

          # Validate deprecated fields too. By default fields whose doc comment
          # contains "Deprecated:" may be legitimately skipped by converters.
          # Note: deprecation is only detectable for types defined in the
          # analyzed package itself (doc comments of imported types are not
          # available to the analysis).
          # Default: false
          include-deprecated: false

          # Validate unexported (private) fields. Only meaningful for
          # converters living in the same package as the models.
          # Default: false
          include-private-fields: false

          # Non-marshallable field types (func, chan, ...):
          #   ignore   - skip entirely
          #   adaptive - validate only when present in both input AND output
          #   strict   - treat like normal fields
          # Default: "adaptive"
          non-marshallable-fields: "adaptive"

          # Which fields must be handled:
          #   strict       - all fields from both input and output
          #   intersection - only fields present in both
          # Default: "strict"
          field-validation-mode: "strict"

          # Note: the `format` setting is ignored under golangci-lint (the
          # single-line default format is forced); `fix-mode` suggested fixes
          # are available via `go vet -vettool` with the -fix flag.
