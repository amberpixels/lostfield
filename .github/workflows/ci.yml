name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # go.mod requires go 1.26; older toolchains would auto-upgrade anyway,
      # so a version matrix below 1.26 tests nothing.
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run tests
        run: just test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run linter
        run: just lint

  selfcheck:
    name: dogfood (lostfield on lostfield)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install lostfield
        run: go install ./cmd/lostfield

      - name: Run lostfield on itself
        run: go vet -vettool=$(which lostfield) ./...
